- defaults:
    link:
      relink: true
      create: true
      glob: true

- clean: ['~']

- link:
    ~/.config/: .config/*
    ~/.zshrc: .zshrc
    ~/.fvmrc: .fvmrc

- shell:
  -
    command: bash scripts/setup-git-identity.sh
    stdin: true
    stdout: true
    description: Set git identity
  -
    command: bash scripts/install-homebrew.sh
    description: Install Homebrew
    stdout: true
    stderr: true
  -
    command: bash scripts/install-pnpm.sh
    description: Install pnpm
    stdout: true
    stderr: true
  -
    command: bash scripts/setup-node-lts.sh
    description: Set Node LTS via pnpm
    stdout: true
    stderr: true
  -
    command: brew bundle
    description: Install Homebrew packages
    stdout: true
    stderr: true
  -
    command: bash scripts/install-gh-dash.sh
    description: Install gh-dash GitHub CLI extension
    stdout: true
    stderr: true

