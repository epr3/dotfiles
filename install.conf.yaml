- defaults:
    link:
      relink: true
      create: true
      glob: true

- clean: ['~']

- link:
    ~/.config/: .config/*
    ~/.zshrc: .zshrc
    ~/.fvmrc: .fvmrc
    ~/Library/Application Support/Code/User/settings.json: vscode/settings.json
    ~/Library/Application Support/Code/User/keybindings.json: vscode/keybindings.json
    ~/Library/Application Support/Code/User/snippets/: vscode/snippets/*

- shell:
  -
    command: bash scripts/setup-git-identity.sh
    stdin: true
    stdout: true
    description: Set git identity
  -
    command: bash scripts/install-homebrew.sh
    description: Install Homebrew
    stdout: true
    stderr: true
  -
    command: bash scripts/install-pnpm.sh
    description: Install pnpm
    stdout: true
    stderr: true
  -
    command: bash scripts/setup-node-lts.sh
    description: Set Node LTS via pnpm
    stdout: true
    stderr: true
  -
    command: brew bundle
    description: Install Homebrew packages
    stdout: true
    stderr: true
  -
    command: bash scripts/install-gh-dash.sh
    description: Install gh-dash GitHub CLI extension
    stdout: true
    stderr: true
  -
    command: bash scripts/install-vscode-extensions.sh
    description: Install VS Code extensions
    stdout: true
    stderr: true
